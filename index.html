<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Basket Lab - Ultra Stable</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        canvas { width: 100vw; height: 100vh; object-fit: contain; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .panel { position: absolute; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 8px; pointer-events: auto; }
        #top-left { top: 10px; left: 10px; font-size: 12px; }
        #feedback { position: absolute; top: 35%; width: 100%; text-align: center; font-size: 1.8rem; font-weight: bold; color: #ff5722; text-shadow: 2px 2px 5px #000; }
        .controls { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; gap: 8px; pointer-events: auto; }
        button { padding: 12px 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; color: white; }
        #btn-start { background: #ff5722; }
        #btn-save-exit { background: #4CAF50; display: none; }
        #btn-discard-exit { background: #444; }
    </style>
</head>
<body>

<div id="container">
    <video id="input_video" playsinline muted autoplay></video>
    <canvas id="output_canvas"></canvas>
    
    <div id="ui">
        <div id="top-left" class="panel">
            GIOCATORE: <input type="text" id="player_name" value="Atleta 1" style="width:70px; background:#222; color:white; border:none;"><br>
            TIRI: <span id="counter">0</span>
        </div>
        <div id="feedback">ATTIVA AUDIO E AVVIA</div>
        <div class="controls">
            <button id="btn-start">AVVIA COACH</button>
            <button id="btn-save-exit">SALVA E CHIUDI</button>
            <button id="btn-discard-exit">ESCI</button>
        </div>
    </div>
</div>

<script>
// --- CONFIGURAZIONE AUDIO SINTETIZZATO ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function playSound(freq, type, dur) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
}

const sounds = {
    perfect: () => { playSound(880, 'sine', 0.3); setTimeout(() => playSound(1046, 'sine', 0.3), 100); },
    error_dip: () => playSound(180, 'square', 0.4),          // Errori Fase 1 Caricamento
    error_path: () => playSound(400, 'sawtooth', 0.3),        // Errori Fase 2 Risalita
    error_release: () => playSound(150, 'sine', 0.5),         // Errori Fase 3 Rilascio
    error_biomech: () => { playSound(300, 'triangle', 0.2); setTimeout(() => playSound(300, 'triangle', 0.2), 150); } // Errori Fase 4 Biomeccanici
};

// --- LOGICA DI ANALISI ---
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxUGkpdZCXjgT2g0lnLZV0OM8Esyp-Bm0xAXs4Pkvrr2KgaCZezWV3JORo5TgnchQmTcw/exec";
let shotLog = [];
let state = "IDLE"; 
let shotData = {};
let cameraActive = null;

const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const feedback = document.getElementById('feedback');

function getAngle(a, b, c) {
    let rad = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
    let ang = Math.abs(rad * 180 / Math.PI);
    return ang > 180 ? 360 - ang : ang;
}

function analyzePose(lm) {
    const nose=lm[0], shoulder=lm[12], elbow=lm[14], wrist=lm[16], eye=lm[2], ear=lm[8], hip=lm[24], knee=lm[26], ankle=lm[28], foot=lm[32], index=lm[20];
    const kA = getAngle(hip, knee, ankle);
    const eA = getAngle(shoulder, elbow, wrist);
    const wA = getAngle(elbow, wrist, index);

    // --- 1. FASE DI CARICAMENTO (THE DIP & LOAD) ---
    if (state === "IDLE" && kA < 140) {
        state = "DIP";
        shotData = { errors: [], minK: kA, sX: ankle.x, bY: wrist.y, frameCount: 0 };
    }
    
    if (state === "DIP") {
        // Naso oltre le punte (Diving)
        if (nose.x > foot.x + 0.05) shotData.errors.push("Naso_oltre_le_punte_(Diving)");
        // Talloni "piantati" (Heel Striking)
        if (getAngle(knee, ankle, foot) < 70) shotData.errors.push("Talloni_piantati_(Heel_Striking)");
        // Palla ferma al petto (Early Pause) - Semplificato: se la palla non si muove durante il dip
        if (shotData.frameCount > 5 && Math.abs(wrist.y - shotData.bY) < 0.005) shotData.errors.push("Palla_ferma_al_petto_(Early_Pause)");
        
        if (kA > 145) { // Passa alla fase di risalita
            state = "RISE"; 
            shotData.riseStartKneeAngle = kA; // Angolo ginocchio inizio risalita
        }
        shotData.frameCount++;
    }

    // --- 2. FASE DI RISALITA (THE SHOT PATH) ---
    if (state === "RISE") {
        // L'Hitch (Tiro in due tempi)
        if (wrist.y < nose.y && wrist.y > ear.y && Math.abs(wrist.y - (shotData.lastY || 0)) < 0.001) shotData.errors.push("L'Hitch_(Tiro_in_due_tempi)");
        shotData.lastY = wrist.y;
        
        // Ball after Body (Sincronismo errato) - Se il braccio inizia a salire dopo che le gambe sono già quasi dritte
        if (kA > 165 && wrist.y > nose.y && shotData.riseStartKneeAngle < 150) shotData.errors.push("Ball_after_Body_(Sincronismo_errato)");
        
        // Set Point Arretrato (Catapulta)
        if (eA > 160 && wrist.x < ear.x) shotData.errors.push("Set_Point_Arretrato_(Catapulta)");

        if (eA > 160) { // Inizia la fase di rilascio (braccio teso)
            state = "RELEASE"; 
        }
    }

    // --- 3. FASE DI RILASCIO (THE RELEASE) ---
    if (state === "RELEASE") {
        // Gomito Basso (Flat Release)
        if (elbow.y > eye.y) shotData.errors.push("Gomito_Basso_(Flat_Release)");
        
        // Mento proiettato avanti (Turtle Neck)
        if (nose.x > shoulder.x + 0.06) shotData.errors.push("Mento_proiettato_avanti_(Turtle_Neck)");

        // Trigger per finalizzare il tiro dopo un breve ritardo per il follow-through
        setTimeout(() => {
            if (state !== "FINALIZED") { // Previene trigger multipli
                // Short-Arming (Braccio retratto)
                if (getAngle(shoulder, elbow, wrist) < 155) shotData.errors.push("Short-Arming_(Braccio_retratto)");
                
                // Mancanza di Sway (Atterraggio verticale/rigido)
                if (Math.abs(ankle.x - shotData.startX) < 0.03) shotData.errors.push("Mancanza_di_Sway_(Atterraggio_rigido)");
                
                // Angolo del Polso piatto
                if (getAngle(elbow, wrist, index) < 150) shotData.errors.push("Angolo_del_Polso_piatto");
                
                finalizeShot(eA, shotData.minK, Math.abs(ankle.x - shotData.startX));
            }
        }, 1000); // Ritardo per catturare il follow-through
        state = "FINALIZED"; // Stato per evitare che si finalizzi più volte
    }
}

function finalizeShot(eA, kA, swayAbs) {
    let resultText = "PERFETTO";
    if (shotData.errors.length > 0) {
        resultText = shotData.errors[0].replace(/_/g, " "); // Rende il testo leggibile
        
        // Categoria errori per il suono
        const errorCategory = shotData.errors[0];
        if (errorCategory.includes("Naso_oltre_le_punte") || errorCategory.includes("Talloni_piantati") || errorCategory.includes("Palla_ferma")) sounds.error_dip();
        else if (errorCategory.includes("Hitch") || errorCategory.includes("Ball_after_Body") || errorCategory.includes("Catapulta")) sounds.error_path();
        else if (errorCategory.includes("Gomito_Basso") || errorCategory.includes("Short-Arming") || errorCategory.includes("Mancanza_di_Sway")) sounds.error_release();
        else sounds.error_biomech();
        
        feedback.innerHTML = `<span style="color:#ff3d00">${resultText}</span>`;
    } else {
        sounds.perfect();
        feedback.innerHTML = `<span style="color:#00e676">PERFETTO!</span>`;
    }

    shotLog.push({
        player: document.getElementById('player_name').value || "Anonimo",
        esito: resultText,
        dettagli: shotData.errors.join(", ").replace(/_/g, " ") || "Nessuno",
        angoloGomito: Math.round(eA),
        angoloGinocchio: Math.round(kA),
        swayCm: Math.round(swayAbs * 100) // Convertiamo in cm (approssimazione)
    });

    document.getElementById('counter').innerText = shotLog.length;
    document.getElementById('btn-save-exit').style.display = "block";
    state = "IDLE"; // Reset per il prossimo tiro
}

// --- LOGICA VIDEO E MEDIAPIPE ---
const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
pose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

pose.onResults(results => {
    if (!results.image) return;

    // FIX SCHERMO NERO: Forza dimensioni canvas
    if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
    }

    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

    if (results.poseLandmarks) {
        // Disegna lo scheletro e chiama la funzione di analisi
        drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
        analyzePose(results.poseLandmarks);
    }
    ctx.restore();
});

document.getElementById('btn-start').onclick = function() {
    // Inizializza AudioContext al click dell'utente (obbligatorio su iOS)
    if (!audioCtx) { audioCtx = new AudioCtx(); }
    
    this.style.display = "none"; // Nasconde il tasto start
    
    const camera = new Camera(video, {
        onFrame: async () => { await pose.send({image: video}); },
        width: 640, height: 480, facingMode: 'environment'
    });
    
    // Avvia la camera e gestisce eventuali errori
    camera.start().then(() => {
        feedback.innerText = "COACH ATTIVO: VAI IN POSIZIONE";
    }).catch(err => {
        feedback.innerHTML = `<span style="color:#ff3d00">ERRORE CAMERA: ${err}</span>`;
    });
};

// --- FUNZIONI DI USCITA ---
async function stopAndExit(save) {
    // Spegne la telecamera
    if (cameraActive && video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
        cameraActive = null;
    }
    
    if (save && shotLog.length > 0) {
        feedback.innerText = "SALVATAGGIO...";
        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify(shotLog)
            });
            alert("Sessione salvata su Google Drive!");
        } catch (e) {
            alert("Errore salvataggio dati su Drive. Controlla la connessione.");
        }
    } else if (save && shotLog.length === 0) {
        alert("Nessun tiro da salvare.");
    }

    feedback.innerText = "SESSIONE CHIUSA";
    // Tenta di chiudere la finestra o reindirizza a pagina bianca
    setTimeout(() => {
        window.close(); 
        window.location.href = "about:blank";
    }, 500);
}

document.getElementById('btn-save-exit').onclick = () => stopAndExit(true);
document.getElementById('btn-discard-exit').onclick = () => {
    if (shotLog.length > 0 && !confirm("Sei sicuro di voler uscire? I dati di questa sessione verranno persi.")) {
        return; // L'utente ha annullato l'uscita
    }
    stopAndExit(false);
};

</script>
</body>
</html>
