<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>AI Basket Coach - Landscape</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <style>
    body { 
      margin: 0; 
      padding: 0;
      background: #000; 
      color: white; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden; 
    }
    #container { 
      position: relative; 
      width: 100vw; 
      height: 100vh; 
      display: flex;
      justify-content: center;
      align-items: center;
    }
    video { display: none; }
    canvas { 
      height: 100vh; 
      width: 100vw; 
      object-fit: contain; /* Mantiene le proporzioni senza tagliare */
    }
    
    /* Overlay UI */
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; /* Permette di cliccare attraverso se necessario */
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    #header {
      padding: 15px;
      background: rgba(0,0,0,0.5);
      display: flex;
      justify-content: space-between;
      pointer-events: auto;
    }

    #status {
      font-size: 1.2rem;
      font-weight: bold;
      color: #ff5722;
      text-transform: uppercase;
    }

    #footer {
      padding: 20px;
      display: flex;
      justify-content: center;
      pointer-events: auto;
    }

    button { 
      background: #ff5722; 
      color: white; 
      border: none; 
      padding: 15px 40px; 
      font-size: 18px; 
      font-weight: bold;
      border-radius: 8px; 
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>
  <div id="container">
    <video id="input_video" playsinline></video>
    <canvas id="output_canvas"></canvas>
    
    <div id="overlay">
      <div id="header">
        <div id="brand">AI COACH 360</div>
        <div id="status">RUOTA IL TELEFONO E PREMI AVVIA</div>
      </div>
      
      <div id="footer">
        <button id="start_btn">AVVIA ANALISI</button>
      </div>
    </div>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const startBtn = document.getElementById('start_btn');
    const statusText = document.getElementById('status');
    
    // Suoni
    const soundPerfect = new Audio('https://www.soundjay.com/buttons/sounds/button-37.mp3');
    const soundError = new Audio('https://www.soundjay.com/buttons/sounds/button-10.mp3');

    let isShooting = false;

    function calculateAngle(a, b, c) {
      let radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
      let angle = Math.abs(radians * 180.0 / Math.PI);
      if (angle > 180.0) angle = 360 - angle;
      return angle;
    }

    function onResults(results) {
      // Adatta canvas alle dimensioni del video in tempo reale
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      if (results.poseLandmarks) {
        const lm = results.pose_landmarks;
        
        // Disegno tecnico (linee verdi più sottili per non coprire il canestro)
        drawConnectors(canvasCtx, lm, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
        drawLandmarks(canvasCtx, [lm[12], lm[14], lm[16], lm[0]], {color: '#FF0000', lineWidth: 1, radius: 3});

        // Logica Tiro
        const shoulder = lm[12];
        const elbow = lm[14];
        const wrist = lm[16];
        const nose = lm[0];

        const angle = calculateAngle(shoulder, elbow, wrist);

        if (angle > 165 && wrist.y < nose.y && !isShooting) {
          isShooting = true;
          
          if (elbow.y < nose.y) {
            soundPerfect.play();
            statusText.innerText = "PERFETTO!";
            statusText.style.color = "#4CAF50";
          } else {
            soundError.play();
            statusText.innerText = "GOMITO BASSO!";
            statusText.style.color = "#f44336";
          }

          setTimeout(() => { 
            isShooting = false; 
            statusText.innerText = "PRONTO PER IL PROSSIMO TIRO";
            statusText.style.color = "#ff5722";
          }, 2500);
        }
      }
      canvasCtx.restore();
    }

    const pose = new Pose({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
    }});

    pose.setOptions({
      modelComplexity: 1,
      smoothLandmarks: true,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });
    pose.onResults(onResults);

    startBtn.onclick = () => {
      // Configurazione per iPhone Landscape (HD 1280x720)
      const camera = new Camera(videoElement, {
        onFrame: async () => {
          await pose.send({image: videoElement});
        },
        width: 1280,
        height: 720
      });
      camera.start();
      startBtn.style.display = 'none';
      statusText.innerText = "ANALISI ATTIVA - INQUADRATURA LATERALE";
    };
  </script>
</body>
</html>
