<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Basket Lab Pro - Biomechanical Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { position: absolute; width: 1px; height: 1px; opacity: 0; }
        canvas { width: 100vw; height: 100vh; object-fit: contain; cursor: crosshair; background: #111; }
        .ui-panel { position: absolute; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; border: 1px solid #444; pointer-events: auto; z-index: 100; }
        #top-left { top: 15px; left: 15px; width: 280px; max-height: 85vh; overflow-y: auto; }
        #controls { bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
        #feedback { position: absolute; top: 20%; width: 100%; text-align: center; font-size: 1.5rem; font-weight: bold; color: #ff5722; text-shadow: 2px 2px 4px #000; pointer-events: none; z-index: 10; }
        button, .btn-label { background: #ff5722; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px; }
        input[type="file"] { display: none; }
        .stat-row { display: flex; justify-content: space-between; margin: 4px 0; font-size: 0.8rem; border-bottom: 1px solid #333; padding-bottom: 2px; }
        .val { color: #00e676; font-weight: bold; }
        #crop_canvas { display: none; }
    </style>
</head>
<body>

<div id="container">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    <canvas id="crop_canvas"></canvas>
    
    <div id="feedback">CARICA VIDEO</div>

    <div id="top-left" class="ui-panel">
        <h3 style="margin:0 0 10px 0; color:#ff5722; font-size: 1rem;">COACH IA FEEDBACK</h3>
        <div id="live-status">
            <div class="stat-row">Tiri Rilevati: <span id="shot-count" class="val">0</span></div>
            <div class="stat-row">Fase attuale: <span id="cur-phase" class="val">ATTESA</span></div>
        </div>
        <div id="coach-advice" style="margin-top:10px; padding:8px; background:#222; border-radius:5px; font-size:0.75rem; color:#ff5722; border-left:3px solid #ff5722; display:none;">
            <b>TIP:</b> <span id="tip-text">...</span>
        </div>
    </div>

    <div id="controls" class="ui-panel">
        <label class="btn-label" for="video_file">CARICA VIDEO</label>
        <input type="file" id="video_file" accept="video/*">
        <button id="btn-start" style="display:none;">AVVIA ANALISI</button>
        <button id="btn-save" style="display:none; background:#4CAF50;">SALVA SU GOOGLE</button>
        <button onclick="location.reload()" style="background:#444;">RESET</button>
    </div>
</div>

<script>
// !!! INCOLLA QUI IL TUO URL DI GOOGLE APPS SCRIPT !!!
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby8fNzStDBZFsNYEmH7w_f2kLEgBjl3LQGcQd52T2tAumqui6yKQeH7gwD7rOn_B42lBA/exec";

const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const cropCanvas = document.getElementById('crop_canvas');
const cropCtx = cropCanvas.getContext('2d');
const feedback = document.getElementById('feedback');

let canestroPos = null, playerX = null, calibrationStep = 0;
let shotLog = [], state = "IDLE", currentShot = null, lastShotTime = 0;
let roi = { x: 0, width: 1 };

// --- HELPERS MATEMATICI ---
function getAngle(a, b, c) {
    let ang = Math.abs((Math.atan2(c.y-b.y, c.x-b.x) - Math.atan2(a.y-b.y, a.x-b.x)) * 180 / Math.PI);
    return ang > 180 ? 360 - ang : Math.round(ang);
}

function getVerticalAngle(top, bottom) {
    return Math.round(Math.abs(Math.atan2(top.x - bottom.x, top.y - bottom.y) * 180 / Math.PI));
}

// --- COACH IA: INTERPRETAZIONE ---
function getMetricStatus(value, type) {
    switch(type) {
        case 'knee_dip': 
            if (value >= 120 && value <= 145) return { label: "OTTIMO", color: "#00e676", advice: "Buon uso delle gambe." };
            if (value < 120) return { label: "ECCESSIVO", color: "#ff1744", advice: "Pieghi troppo le ginocchia." };
            return { label: "SCARSO", color: "#ffea00", advice: "Usa più spinta dalle gambe." };
        case 'fingers': 
            return value === "SI" ? { label: "SI", color: "#00e676", advice: "Ottimo backspin." } 
                                  : { label: "NO", color: "#ff1744", advice: "Spezza il polso nel finale!" };
        case 'sync': 
            if (value > 140) return { label: "FLUIDO", color: "#00e676", advice: "Sincronia perfetta." };
            return { label: "DUE TEMPI", color: "#ffea00", advice: "Sali con le gambe insieme alla palla." };
        default: return { label: "OK", color: "#fff", advice: "" };
    }
}

// --- LOGICA ANALISI ---
function analyzePose(lm) {
    const now = Date.now();
    const nose=lm[0], shoulder=lm[12], elbow=lm[14], wrist=lm[16], hip=lm[24], knee=lm[26], ankle=lm[28], foot=lm[32], index=lm[20], ear=lm[8];
    
    const kA = getAngle(hip, knee, ankle);
    const eA = getAngle(shoulder, elbow, wrist);
    const wA = getAngle(elbow, wrist, index);
    const bA = getVerticalAngle(shoulder, hip);
    const aA = getAngle(knee, ankle, foot);

    // 1. FASE DIP
    if (state === "IDLE" && kA < 140 && (now - lastShotTime > 1500)) {
        state = "DIP";
        currentShot = {
            timestamp: new Date().toLocaleTimeString(),
            dip: { kA, aA, bA, wA, ballHipDist: Math.abs(wrist.x - hip.x).toFixed(3) },
            maxK: kA,
            initialAnkleX: ankle.x
        };
        document.getElementById('cur-phase').innerText = "DIP (CARICAMENTO)";
    }

    // 2. FASE RISE
    if (state === "DIP") {
        if (kA < currentShot.maxK) currentShot.maxK = kA;
        if (kA > currentShot.maxK + 7) {
            state = "RISE";
            document.getElementById('cur-phase').innerText = "RISE (RISALITA)";
        }
    }

    if (state === "RISE") {
        // SET POINT (Palla al viso)
        if (wrist.y <= nose.y && !currentShot.set) {
            currentShot.set = {
                ball_vs_nose: wrist.y < nose.y ? "Sopra" : "Sotto",
                eH_set: elbow.y.toFixed(3),
                eA_set: eA,
                wA_set: wA,
                torso_set: bA,
                align: Math.abs(nose.x - index.x) < 0.05 ? "SI" : "NO"
            };
        }
        // 3. RELEASE
        if (eA > 155) {
            state = "RELEASE";
            document.getElementById('cur-phase').innerText = "RELEASE (LANCIO)";
            finalizeShot(lm, eA, bA, ankle.x);
        }
    }
}

function finalizeShot(lm, relAngle, torsoAngle, finalAnkleX) {
    const elbow=lm[14], wrist=lm[16], index=lm[20], shoulder=lm[12], hip=lm[24];
    
    setTimeout(() => {
        const fingerVal = getAngle(elbow, wrist, index) < 160 ? "SI" : "NO";
        const kneeStat = getMetricStatus(currentShot.dip.kA, 'knee_dip');
        const syncStat = getMetricStatus(currentShot.maxK, 'sync');
        const fingerStat = getMetricStatus(fingerVal, 'fingers');

        const fullData = {
            timestamp: currentShot.timestamp,
            dip: currentShot.dip,
            rise: { kA_at_rise: currentShot.maxK },
            set: currentShot.set || { ball_vs_nose: "N/D", eH_set: 0, eA_set: 0, wA_set: 0, torso_set: 0 },
            release: {
                angolo_rilascio: relAngle,
                sway: (currentShot.initialAnkleX - finalAnkleX).toFixed(4),
                estensione_braccio: relAngle > 168 ? "Completa" : "Corta",
                dita_barattolo: fingerVal,
                shoulder_hip_align: Math.abs(shoulder.x - hip.x).toFixed(4),
                eH_final: elbow.y.toFixed(3)
            },
            commento_coach: `${kneeStat.label} | ${fingerStat.advice}`
        };

        shotLog.push(fullData);

        // Aggiorna UI
        document.getElementById('shot-count').innerText = shotLog.length;
        document.getElementById('cur-phase').innerText = "IDLE";
        document.getElementById('coach-advice').style.display = "block";
        document.getElementById('tip-text').innerText = fingerStat.advice;
        
        // Pannello statistiche aggiornato con colori
        document.getElementById('live-status').innerHTML = `
            <div class="stat-row">Tiri Rilevati: <span class="val">${shotLog.length}</span></div>
            <div class="stat-row">Ginocchia: <b style="color:${kneeStat.color}">${kneeStat.label}</b></div>
            <div class="stat-row">Sincronia: <b style="color:${syncStat.color}">${syncStat.label}</b></div>
            <div class="stat-row">Polso: <b style="color:${fingerStat.color}">${fingerStat.label}</b></div>
            <div class="stat-row">Sway: <span class="val">${fullData.release.sway}</span></div>
        `;

        document.getElementById('btn-save').style.display = "block";
        state = "IDLE";
        lastShotTime = Date.now();
    }, 600);
}

// --- CORE ENGINE & VIDEO ---
const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });
pose.onResults(r => {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video, 0,0,canvas.width,canvas.height);
    if (r.poseLandmarks) {
        r.poseLandmarks.forEach(lm => { lm.x = lm.x * roi.width + roi.x; });
        drawConnectors(ctx, r.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
        analyzePose(r.poseLandmarks);
    }
});

document.getElementById('video_file').onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (ev) => { video.src = ev.target.result; video.load(); };
    reader.readAsDataURL(e.target.files[0]);
    video.onloadeddata = () => {
        video.currentTime = 0.1;
        setTimeout(() => {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.drawImage(video, 0,0,canvas.width,canvas.height);
            calibrationStep = 1;
            feedback.innerText = "1. CLICCA SUL CANESTRO";
        }, 500);
    };
};

canvas.addEventListener('mousedown', (e) => {
    if (calibrationStep === 0) return;
    const rect = canvas.getBoundingClientRect();
    const x = ((e.clientX - rect.left) * (canvas.width / rect.width)) / canvas.width;
    const y = ((e.clientY - rect.top) * (canvas.height / rect.height)) / canvas.height;
    if (calibrationStep === 1) {
        canestroPos = {x, y}; calibrationStep = 2;
        feedback.innerText = "2. ISOLA IL TIRATORE (CLICCA SU DI LUI)";
    } else if (calibrationStep === 2) {
        playerX = x; roi.x = Math.max(0, x - 0.15); roi.width = 0.3;
        feedback.innerText = "TARGET OK. AVVIA ANALISI.";
        document.getElementById('btn-start').style.display = "block";
        ctx.fillStyle = "rgba(0, 230, 118, 0.2)";
        ctx.fillRect(roi.x * canvas.width, 0, roi.width * canvas.width, canvas.height);
    }
});

document.getElementById('btn-start').onclick = function() {
    this.style.display = "none";
    video.play();
    (async function loop() {
        if (!video.ended && !video.paused) {
            cropCanvas.width = video.videoWidth * roi.width;
            cropCanvas.height = video.videoHeight;
            cropCtx.drawImage(video, roi.x * video.videoWidth, 0, roi.width * video.videoWidth, video.videoHeight, 0, 0, cropCanvas.width, cropCanvas.height);
            await pose.send({image: cropCanvas});
            requestAnimationFrame(loop);
        } else { feedback.innerText = "ANALISI COMPLETATA"; }
    })();
};

document.getElementById('btn-save').onclick = async function() {
    this.innerText = "INVIO...";
    this.disabled = true;
    try {
        await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(shotLog)
        });
        alert("Salvataggio completato!");
        this.innerText = "SALVATO";
    } catch (e) {
        alert("Errore invio");
        this.disabled = false;
        this.innerText = "RIPROVA";
    }
};
</script>
</body>
</html>
