<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Basket Lab Pro - Ultra Stability v3</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        canvas { width: 100vw; height: 100vh; object-fit: contain; cursor: crosshair; background: #111; }
        .ui-panel { position: absolute; background: rgba(0,0,0,0.9); padding: 15px; border-radius: 12px; border: 1px solid #444; pointer-events: auto; z-index: 100; }
        #top-left { top: 15px; left: 15px; width: 280px; }
        #controls { bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 200; }
        #feedback { position: absolute; top: 20%; width: 100%; text-align: center; font-size: 1.5rem; font-weight: bold; color: #ff5722; text-shadow: 2px 2px 4px #000; pointer-events: none; z-index: 10; }
        button, .btn-label { background: #ff5722; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px; }
        #btn-save { background: #4CAF50; display: none; }
        #btn-exit { background: #d32f2f; }
        #btn-reset { background: #555; }
        input[type="file"] { display: none; }
        .stat-row { display: flex; justify-content: space-between; margin: 4px 0; font-size: 0.8rem; border-bottom: 1px solid #333; padding-bottom: 2px; }
        .val { color: #00e676; font-weight: bold; }
        #crop_canvas { display: none; }
    </style>
</head>
<body>

<div id="container">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    <canvas id="crop_canvas"></canvas>
    
    <div id="feedback">1. CARICA VIDEO</div>

    <div id="top-left" class="ui-panel">
        <h3 style="margin:0 0 10px 0; color:#ff5722; font-size: 1rem;">ULTRA-STABLE ANALYTICS</h3>
        <div id="live-status">
            <div class="stat-row">Tiri Rilevati: <span id="shot-count" class="val">0</span></div>
            <div class="stat-row">Stato: <span id="cur-phase" class="val">IDLE</span></div>
        </div>
        <hr style="border:0; border-top:1px solid #444; margin:10px 0;">
        <div id="coach-advice" style="font-size:0.75rem; color:#00e676;">Filtro anti-jitter attivo.</div>
    </div>

    <div id="controls" class="ui-panel">
        <label id="lbl-upload" class="btn-label" for="video_file">CARICA VIDEO</label>
        <input type="file" id="video_file" accept="video/*">
        <button id="btn-start" style="display:none;">AVVIA</button>
        <button id="btn-save">SALVA</button>
        <button id="btn-reset" onclick="location.reload()">RESET</button>
        <button id="btn-exit" onclick="window.location.href='about:blank'">ESCI</button>
    </div>
</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby8fNzStDBZFsNYEmH7w_f2kLEgBjl3LQGcQd52T2tAumqui6yKQeH7gwD7rOn_B42lBA/exec";

const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const cropCanvas = document.getElementById('crop_canvas');
const cropCtx = cropCanvas.getContext('2d');
const feedback = document.getElementById('feedback');

let canestroPos = null, playerX = null, calibrationStep = 0, isAnalyzing = false;
let shotLog = [], state = "IDLE", currentShot = null, lastShotTime = 0;
let roi = { x: 0, width: 1 };
let frameCounter = 0;
let releaseBuffer = [];

// --- FILTRI DI STABILIZZAZIONE ---
function getAngle(a, b, c) {
    if(!a || !b || !c || a.visibility < 0.65) return null;
    let v1 = { x: a.x - b.x, y: a.y - b.y };
    let v2 = { x: c.x - b.x, y: c.y - b.y };
    let dot = v1.x * v2.x + v1.y * v2.y;
    let mag1 = Math.sqrt(v1.x**2 + v1.y**2);
    let mag2 = Math.sqrt(v2.x**2 + v2.y**2);
    let ang = Math.acos(Math.min(Math.max(dot / (mag1 * mag2), -1), 1)) * 180 / Math.PI;
    
    // Filtro fisiologico: un ginocchio o gomito umano sotto i 30 gradi in un tiro è un errore di tracking
    if (ang < 30) return null; 
    return Math.round(ang);
}

function getVerticalAngle(top, bottom) {
    if(!top || !bottom || top.visibility < 0.65) return null;
    let ang = Math.abs(Math.atan2(top.x - bottom.x, top.y - bottom.y) * 180 / Math.PI);
    // Filtro busto: se il busto è quasi orizzontale (es 30°) è un errore di tracking
    if (ang < 60) return null;
    return Math.round(ang);
}

function analyzePose(lm) {
    const nose=lm[0], shoulder=lm[12], elbow=lm[14], wrist=lm[16], hip=lm[24], knee=lm[26], ankle=lm[28], foot=lm[32], index=lm[20];
    
    const kA = getAngle(hip, knee, ankle);
    const eA = getAngle(shoulder, elbow, wrist);
    const bA = getVerticalAngle(shoulder, hip);
    
    if (kA === null || eA === null || bA === null) return;

    // 1. STATO IDLE -> DIP
    if (state === "IDLE" && kA < 135 && (video.currentTime - lastShotTime > 1.2)) {
        state = "DIP";
        currentShot = { 
            t: new Date().toLocaleTimeString(), 
            dip: { kA, aA: getAngle(knee, ankle, foot), bA, wA: getAngle(elbow, wrist, index) }, 
            maxK: kA, startX: ankle.x 
        };
        document.getElementById('cur-phase').innerText = "DIP";
    }
    
    if (state === "DIP") {
        if (kA < currentShot.maxK) {
            currentShot.maxK = kA;
            // Aggiorna i dati del DIP solo se siamo nel punto più basso per stabilità
            currentShot.dip = { kA, aA: getAngle(knee, ankle, foot), bA, wA: getAngle(elbow, wrist, index) };
        }
        // Transizione a RISE solo se le ginocchia si estendono sensibilmente
        if (kA > currentShot.maxK + 8) state = "RISE";
    }

    if (state === "RISE") {
        document.getElementById('cur-phase').innerText = "RISE";
        // Cattura SET POINT solo durante la risalita (impedisce i 65° d'errore)
        if (wrist.y <= nose.y && !currentShot.set) {
            currentShot.set = { pos: wrist.y < nose.y ? "Sopra" : "Sotto", eH: elbow.y.toFixed(2), kneeAtSet: kA };
        }
        // TRIGGER RILASCIO
        if (eA > 150) {
            state = "RELEASE_TRACKING";
            releaseBuffer = [];
            frameCounter = 0;
        }
    }

    if (state === "RELEASE_TRACKING") {
        frameCounter++;
        releaseBuffer.push(eA);
        if (frameCounter > 15) {
            state = "DONE";
            // Stabilità: media dei 3 valori più alti nel buffer
            releaseBuffer.sort((a,b) => b-a);
            const stableRelease = Math.round((releaseBuffer[0] + releaseBuffer[1] + releaseBuffer[2]) / 3);
            
            const fingerVal = getAngle(elbow, wrist, index) < 160 ? "SI" : "NO";
            
            shotLog.push({
                timestamp: currentShot.t,
                dip: currentShot.dip,
                rise: { kA_at_rise: currentShot.set ? currentShot.set.kneeAtSet : kA },
                set: currentShot.set || { pos: "N/D", eH: 0, eA: 0 },
                release: { 
                    angolo_rilascio: stableRelease, 
                    sway: (currentShot.startX - ankle.x).toFixed(3), 
                    estensione_braccio: stableRelease > 171 ? "Completa" : "Corta", 
                    dita_barattolo: fingerVal 
                },
                commento_coach: (currentShot.set && currentShot.set.kneeAtSet > 125) ? "Fluido" : "Due tempi"
            });
            
            document.getElementById('shot-count').innerText = shotLog.length;
            document.getElementById('btn-save').style.display = "block";
            state = "IDLE"; 
            lastShotTime = video.currentTime;
            document.getElementById('cur-phase').innerText = "IDLE";
        }
    }
}

// --- ENGINE ---
const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.7 });

pose.onResults(r => {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video, 0,0,canvas.width,canvas.height);
    if (r.poseLandmarks) {
        r.poseLandmarks.forEach(lm => { lm.x = lm.x * roi.width + roi.x; });
        drawConnectors(ctx, r.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
        analyzePose(r.poseLandmarks);
    }
    if (canestroPos) {
        ctx.beginPath(); ctx.arc(canestroPos.x * canvas.width, canestroPos.y * canvas.height, 15, 0, 2*Math.PI);
        ctx.strokeStyle = "yellow"; ctx.lineWidth = 4; ctx.stroke();
    }
});

document.getElementById('video_file').onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (ev) => { video.src = ev.target.result; video.load(); };
    reader.readAsDataURL(e.target.files[0]);
    video.onloadedmetadata = () => { video.currentTime = 0.1; };
};

video.onseeked = () => {
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    ctx.drawImage(video, 0,0,canvas.width,canvas.height);
    if (calibrationStep === 0) { calibrationStep = 1; feedback.innerText = "1. CLICCA SUL CANESTRO"; }
    if (isAnalyzing) runAnalysis();
};

canvas.addEventListener('mousedown', (e) => {
    if (isAnalyzing) return;
    const rect = canvas.getBoundingClientRect();
    const x = ((e.clientX - rect.left) * (canvas.width / rect.width)) / canvas.width;
    const y = ((e.clientY - rect.top) * (canvas.height / rect.height)) / canvas.height;
    if (calibrationStep === 1) {
        canestroPos = {x, y}; calibrationStep = 2; feedback.innerText = "2. ISOLA IL TIRATORE";
    } else if (calibrationStep === 2) {
        playerX = x; roi.width = 0.55; roi.x = Math.max(0, x - 0.275);
        feedback.innerText = "PRONTO. AVVIA.";
        document.getElementById('btn-start').style.display = "block";
        ctx.fillStyle = "rgba(0, 230, 118, 0.2)"; ctx.fillRect(roi.x*canvas.width, 0, roi.width*canvas.width, canvas.height);
    }
});

async function runAnalysis() {
    if (video.ended) { feedback.innerText = "FINITO"; return; }
    cropCanvas.width = video.videoWidth * roi.width; cropCanvas.height = video.videoHeight;
    cropCtx.drawImage(video, roi.x * video.videoWidth, 0, roi.width * video.videoWidth, video.videoHeight, 0, 0, cropCanvas.width, cropCanvas.height);
    await pose.send({image: cropCanvas});
    video.currentTime += (1/60);
}

document.getElementById('btn-start').onclick = function() {
    isAnalyzing = true; this.style.display = "none";
    document.getElementById('lbl-upload').style.display = "none";
    video.currentTime = 0; feedback.innerText = "ANALISI...";
};

document.getElementById('btn-save').onclick = async function() {
    this.innerText = "...";
    try {
        await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(shotLog) });
        alert("Inviato!"); this.innerText = "SALVATO";
    } catch(e) { alert("Errore"); this.innerText = "SALVA"; }
};
</script>
</body>
</html>
