<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Basket Lab Pro - Precise & Stable</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { position: absolute; width: 1px; height: 1px; opacity: 0; }
        canvas { width: 100vw; height: 100vh; object-fit: contain; cursor: crosshair; background: #111; }
        .ui-panel { position: absolute; background: rgba(0,0,0,0.9); padding: 15px; border-radius: 12px; border: 1px solid #444; pointer-events: auto; z-index: 100; }
        #top-left { top: 15px; left: 15px; width: 280px; }
        #controls { bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 200; }
        #feedback { position: absolute; top: 20%; width: 100%; text-align: center; font-size: 1.5rem; font-weight: bold; color: #ff5722; text-shadow: 2px 2px 4px #000; pointer-events: none; z-index: 10; }
        button, .btn-label { background: #ff5722; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px; }
        input[type="file"] { display: none; }
        .stat-row { display: flex; justify-content: space-between; margin: 4px 0; font-size: 0.8rem; border-bottom: 1px solid #333; padding-bottom: 2px; }
        .val { color: #00e676; font-weight: bold; }
        #crop_canvas { display: none; }
        #progress-bar { width: 100%; background: #333; height: 5px; margin-top: 10px; border-radius: 5px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: #ff5722; transition: width 0.1s; }
    </style>
</head>
<body>

<div id="container">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    <canvas id="crop_canvas"></canvas>
    
    <div id="feedback">CARICA VIDEO</div>

    <div id="top-left" class="ui-panel">
        <h3 style="margin:0 0 10px 0; color:#ff5722; font-size: 1rem;">PRECISION ANALYTICS</h3>
        <div id="live-status">
            <div class="stat-row">Tiri Rilevati: <span id="shot-count" class="val">0</span></div>
            <div class="stat-row">Progresso: <span id="prog-val" class="val">0%</span></div>
        </div>
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <div id="coach-advice" style="margin-top:10px; padding:8px; background:#222; border-radius:5px; font-size:0.75rem; color:#00e676; border-left:3px solid #ff5722; display:none;">
            <b>COACH IA:</b> <span id="tip-text">Analisi in corso...</span>
        </div>
    </div>

    <div id="controls" class="ui-panel">
        <label id="btn-upload" class="btn-label" for="video_file">SCEGLI VIDEO</label>
        <input type="file" id="video_file" accept="video/*">
        <button id="btn-start" style="display:none;">AVVIA ANALISI</button>
        <button id="btn-save" style="display:none; background:#4CAF50;">SALVA REPORT</button>
        <button id="btn-reset" onclick="location.reload()" style="background:#444;">RESET</button>
    </div>
</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby8fNzStDBZFsNYEmH7w_f2kLEgBjl3LQGcQd52T2tAumqui6yKQeH7gwD7rOn_B42lBA/exec";

const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const cropCanvas = document.getElementById('crop_canvas');
const cropCtx = cropCanvas.getContext('2d');
const feedback = document.getElementById('feedback');
const btnSave = document.getElementById('btn-save');

let canestroPos = null, playerX = null, calibrationStep = 0;
let shotLog = [], state = "IDLE", currentShot = null, lastShotTime = 0;
let roi = { x: 0, width: 1 };

function getAngle(a, b, c) {
    if(!a || !b || !c || a.visibility < 0.6 || b.visibility < 0.6 || c.visibility < 0.6) return null;
    let v1 = { x: a.x - b.x, y: a.y - b.y }, v2 = { x: c.x - b.x, y: c.y - b.y };
    let dot = v1.x * v2.x + v1.y * v2.y;
    let mag1 = Math.sqrt(v1.x**2 + v1.y**2), mag2 = Math.sqrt(v2.x**2 + v2.y**2);
    return Math.round(Math.acos(dot / (mag1 * mag2)) * 180 / Math.PI);
}

function getVerticalAngle(top, bottom) {
    if(!top || !bottom || top.visibility < 0.6) return null;
    return Math.round(Math.abs(Math.atan2(top.x - bottom.x, top.y - bottom.y) * 180 / Math.PI));
}

function getMetricStatus(value, type) {
    switch(type) {
        case 'knee_dip': 
            if (value >= 120 && value <= 145) return { label: "OTTIMO", color: "#00e676", advice: "Caricamento perfetto." };
            if (value < 120) return { label: "ECCESSIVO", color: "#ff1744", advice: "Ginocchia troppo basse." };
            return { label: "SCARSO", color: "#ffea00", advice: "Usa più gambe." };
        case 'fingers': 
            return value === "SI" ? { label: "PRESENTE", color: "#00e676", advice: "Ottimo finale di polso." } 
                                  : { label: "MANCANTE", color: "#ff1744", advice: "Spezza il polso a fine tiro." };
        default: return { label: "OK", color: "#fff", advice: "" };
    }
}

function analyzePose(lm) {
    const nose=lm[0], shoulder=lm[12], elbow=lm[14], wrist=lm[16], hip=lm[24], knee=lm[26], ankle=lm[28], foot=lm[32], index=lm[20];
    const kA = getAngle(hip, knee, ankle), eA = getAngle(shoulder, elbow, wrist), wA = getAngle(elbow, wrist, index);
    const bA = getVerticalAngle(shoulder, hip), aA = getAngle(knee, ankle, foot);

    if (kA === null || eA === null || bA === null) return;

    if (state === "IDLE" && kA < 140 && (video.currentTime - lastShotTime > 1.2)) {
        state = "DIP";
        currentShot = { t: new Date().toLocaleTimeString(), dip: { kA, aA, bA, wA }, maxK: kA, startX: ankle.x };
    }
    if (state === "DIP") {
        if (kA < currentShot.maxK) currentShot.maxK = kA;
        if (kA > currentShot.maxK + 5) state = "RISE";
    }
    if (state === "RISE") {
        if (wrist.y <= nose.y && !currentShot.set) currentShot.set = { pos: wrist.y < nose.y ? "Sopra" : "Sotto", eH: elbow.y.toFixed(2), eA };
        if (eA > 155) {
            state = "RELEASE";
            finalizeShot(lm, eA, ankle.x);
        }
    }
}

function finalizeShot(lm, relAngle, finalX) {
    const fingerVal = getAngle(lm[14], lm[16], lm[20]) < 160 ? "SI" : "NO";
    const kneeStat = getMetricStatus(currentShot.dip.kA, 'knee_dip');
    const fingerStat = getMetricStatus(fingerVal, 'fingers');

    shotLog.push({
        timestamp: currentShot.t, dip: currentShot.dip, rise: { kA_at_rise: currentShot.maxK },
        set: currentShot.set || { pos: "N/D", eH: 0, eA: 0 },
        release: { angolo_rilascio: relAngle, sway: (currentShot.startX - finalX).toFixed(3), estensione_braccio: relAngle > 168 ? "Completa" : "Corta", dita_barattolo: fingerVal },
        commento_coach: `${kneeStat.label} | ${fingerStat.advice}`
    });

    document.getElementById('shot-count').innerText = shotLog.length;
    document.getElementById('coach-advice').style.display = "block";
    document.getElementById('tip-text').innerText = fingerStat.advice;
    btnSave.style.display = "block"; // Appare subito al primo tiro
    state = "IDLE"; lastShotTime = video.currentTime;
}

const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
pose.setOptions({ modelComplexity: 2, smoothLandmarks: true, minDetectionConfidence: 0.7 });

pose.onResults(r => {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video, 0,0,canvas.width,canvas.height);
    if (r.poseLandmarks) {
        r.poseLandmarks.forEach(lm => { lm.x = lm.x * roi.width + roi.x; });
        drawConnectors(ctx, r.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
        analyzePose(r.poseLandmarks);
    }
});

document.getElementById('video_file').onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (ev) => { video.src = ev.target.result; video.load(); };
    reader.readAsDataURL(e.target.files[0]);
    video.onloadeddata = () => {
        video.currentTime = 0.1;
        setTimeout(() => {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.drawImage(video, 0,0,canvas.width,canvas.height);
            calibrationStep = 1; feedback.innerText = "1. CLICCA SUL CANESTRO";
        }, 500);
    };
};

canvas.addEventListener('mousedown', (e) => {
    if (calibrationStep === 0) return;
    const rect = canvas.getBoundingClientRect();
    const x = ((e.clientX - rect.left) * (canvas.width / rect.width)) / canvas.width;
    const y = ((e.clientY - rect.top) * (canvas.height / rect.height)) / canvas.height;
    if (calibrationStep === 1) {
        canestroPos = {x, y}; calibrationStep = 2; feedback.innerText = "2. ISOLA IL TIRATORE (CLICCA SU DI LUI)";
    } else if (calibrationStep === 2) {
        playerX = x; roi.width = 0.45; roi.x = Math.max(0, x - roi.width/2);
        feedback.innerText = "PRONTO. AVVIA ANALISI.";
        document.getElementById('btn-start').style.display = "block";
    }
});

async function processVideo() {
    if (video.currentTime >= video.duration - 0.1) {
        feedback.innerText = "ANALISI COMPLETATA";
        if (shotLog.length > 0) btnSave.style.display = "block";
        return;
    }
    
    // Aggiorna Progresso UI
    let prog = Math.round((video.currentTime / video.duration) * 100);
    document.getElementById('prog-val').innerText = prog + "%";
    document.getElementById('progress-fill').style.width = prog + "%";

    cropCanvas.width = video.videoWidth * roi.width;
    cropCanvas.height = video.videoHeight;
    cropCtx.drawImage(video, roi.x * video.videoWidth, 0, roi.width * video.videoWidth, video.videoHeight, 0, 0, cropCanvas.width, cropCanvas.height);
    
    await pose.send({image: cropCanvas});
    video.currentTime += (1/30); 
    setTimeout(processVideo, 5); 
}

document.getElementById('btn-start').onclick = function() {
    this.style.display = "none";
    document.getElementById('btn-upload').style.display = "none";
    video.currentTime = 0;
    feedback.innerText = "ANALISI DI PRECISIONE...";
    processVideo();
};

btnSave.onclick = async function() {
    this.innerText = "INVIO...";
    this.disabled = true;
    try {
        await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(shotLog) });
        alert("Dati inviati con successo!");
        this.innerText = "SALVATO";
    } catch (e) {
        alert("Errore invio");
        this.disabled = false;
        this.innerText = "RIAPROVA";
    }
};
</script>
</body>
</html>
