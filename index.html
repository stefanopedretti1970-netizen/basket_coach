<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Basket Lab - Fix Caricamento</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        canvas { width: 100vw; height: 100vh; object-fit: contain; cursor: crosshair; background: #111; }
        .ui-panel { position: absolute; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; border: 1px solid #444; pointer-events: auto; z-index: 100; }
        #top-left { top: 15px; left: 15px; width: 250px; }
        #controls { bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
        #feedback { position: absolute; top: 20%; width: 100%; text-align: center; font-size: 1.5rem; font-weight: bold; color: #ff5722; text-shadow: 2px 2px 4px #000; pointer-events: none; z-index: 10; }
        button, .btn-label { background: #ff5722; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        input[type="file"] { display: none; }
        .stat { color: #00e676; font-weight: bold; }
    </style>
</head>
<body>

<div id="container">
    <!-- Video nascosto, Canvas visibile -->
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    
    <div id="feedback">1. CARICA IL VIDEO</div>

    <div id="top-left" class="ui-panel">
        <h3 style="margin:0; color:#ff5722;">SISTEMA TARGET</h3>
        Tiri: <span id="shot-count" class="stat">0</span><br>
        Stato: <span id="target-status" class="stat">In attesa video...</span>
    </div>

    <div id="controls" class="ui-panel">
        <label class="btn-label" for="video_file">CARICA VIDEO</label>
        <input type="file" id="video_file" accept="video/*">
        <button id="btn-start" style="display:none;">AVVIA ANALISI</button>
        <button id="btn-save" style="display:none; background:#4CAF50;">SALVA REPORT</button>
        <button onclick="location.reload()" style="background:#444;">RESET</button>
    </div>
</div>

<script>
// CONFIGURAZIONE
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxcQq1oHvo8XvyO-WBYgdjuX5XFvOaDHXUKwtjvvnu2gOCfR4IrktzLHacZis4QZjV21g/exec";

const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const feedback = document.getElementById('feedback');

let canestroPos = null;
let playerTargetX = null; 
let calibrationStep = 0; 
let shotLog = [];
let state = "IDLE";
let currentShot = null;

// Funzione per disegnare il frame corrente sul canvas (anche quando il video è fermo)
function drawCurrentFrame() {
    if (video.videoWidth > 0) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Se abbiamo già calibrato, disegna i riferimenti
        if (canestroPos) {
            ctx.beginPath();
            ctx.arc(canestroPos.x * canvas.width, canestroPos.y * canvas.height, 20, 0, 2*Math.PI);
            ctx.strokeStyle = "yellow"; ctx.lineWidth = 3; ctx.stroke();
        }
        if (playerTargetX) {
            ctx.beginPath();
            ctx.moveTo(playerTargetX * canvas.width, 0);
            ctx.lineTo(playerTargetX * canvas.width, canvas.height);
            ctx.strokeStyle = "#00e676"; ctx.setLineDash([5, 5]); ctx.stroke();
            ctx.setLineDash([]);
        }
    }
}

// GESTIONE CARICAMENTO VIDEO
document.getElementById('video_file').onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
        video.src = event.target.result;
        video.load();
    };
    reader.readAsDataURL(file);

    video.onloadedmetadata = function() {
        feedback.innerText = "VIDEO CARICATO. ELABORAZIONE...";
    };

    video.onloadeddata = function() {
        // Portiamo il video a 0.1 secondi per mostrare il primo frame
        video.currentTime = 0.1;
        setTimeout(() => {
            drawCurrentFrame();
            calibrationStep = 1;
            feedback.innerText = "1. CLICCA SUL FERRO DEL CANESTRO";
            document.getElementById('target-status').innerText = "Calibrazione canestro...";
        }, 500);
    };
};

// GESTIONE CLICK CALIBRAZIONE
canvas.addEventListener('mousedown', (e) => {
    if (calibrationStep === 0) return;

    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = ((e.clientX - rect.left) * scaleX) / canvas.width;
    const y = ((e.clientY - rect.top) * scaleY) / canvas.height;

    if (calibrationStep === 1) {
        canestroPos = { x, y };
        calibrationStep = 2;
        feedback.innerText = "2. ORA CLICCA SUL TIRATORE";
        drawCurrentFrame();
    } else if (calibrationStep === 2) {
        playerTargetX = x;
        document.getElementById('target-status').innerText = "TARGET AGGANCIATO";
        feedback.innerText = "PRONTO! PREMI AVVIA ANALISI";
        document.getElementById('btn-start').style.display = "block";
        drawCurrentFrame();
    }
});

// LOGICA ANALISI (semplificata per stabilità)
function getAngle(a, b, c) {
    let rad = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
    let ang = Math.abs(rad * 180 / Math.PI);
    return ang > 180 ? 360 - ang : ang;
}

function analyzePose(lm) {
    const hip = lm[24];
    // Filtro Target: ignora chi è lontano dal click X del giocatore
    if (playerTargetX && Math.abs(hip.x - playerTargetX) > 0.15) return;

    const shoulder = lm[12], elbow = lm[14], wrist = lm[16], knee = lm[26], ankle = lm[28];
    const kA = getAngle(hip, knee, ankle);
    const eA = getAngle(shoulder, elbow, wrist);

    if (state === "IDLE" && kA < 140) {
        state = "DIP";
        currentShot = { timestamp: new Date().toLocaleTimeString(), maxK: kA };
    }
    if (state === "DIP" && kA > currentShot.maxK + 5) state = "RISE";
    if (state === "RISE" && eA > 155) {
        state = "RELEASE";
        shotLog.push({ timestamp: currentShot.timestamp, knee: Math.round(currentShot.maxK), release: Math.round(eA) });
        document.getElementById('shot-count').innerText = shotLog.length;
        document.getElementById('btn-save').style.display = "block";
        setTimeout(() => { state = "IDLE"; }, 1000);
    }
}

const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });

pose.onResults(r => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(r.image, 0, 0, canvas.width, canvas.height);
    if (r.poseLandmarks) {
        const isTarget = playerTargetX && Math.abs(r.poseLandmarks[24].x - playerTargetX) < 0.15;
        drawConnectors(ctx, r.poseLandmarks, POSE_CONNECTIONS, {color: isTarget ? '#00FF00' : '#444', lineWidth: 2});
        if (isTarget) analyzePose(r.poseLandmarks);
    }
});

document.getElementById('btn-start').onclick = function() {
    this.style.display = "none";
    feedback.innerText = "ANALISI IN CORSO...";
    video.play();
    async function process() {
        if (!video.ended && !video.paused) {
            await pose.send({image: video});
            requestAnimationFrame(process);
        } else {
            feedback.innerText = "ANALISI COMPLETATA";
        }
    }
    process();
};

document.getElementById('btn-save').onclick = async function() {
    this.innerText = "INVIO...";
    try {
        await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(shotLog) });
        alert("Dati salvati!");
        this.innerText = "SALVATO";
    } catch(e) { alert("Errore"); this.innerText = "RIPROVA"; }
};
</script>
</body>
</html>
