<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Basket Lab Pro - Multi-Person Robust</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { position: absolute; width: 1px; height: 1px; opacity: 0; }
        canvas { width: 100vw; height: 100vh; object-fit: contain; cursor: crosshair; }
        .ui-panel { position: absolute; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; border: 1px solid #444; pointer-events: auto; }
        #top-left { top: 15px; left: 15px; width: 250px; }
        #controls { bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
        #feedback { position: absolute; top: 20%; width: 100%; text-align: center; font-size: 1.5rem; font-weight: bold; color: #ff5722; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        button, .btn-label { background: #ff5722; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        input[type="file"] { display: none; }
        .stat { color: #00e676; font-weight: bold; }
    </style>
</head>
<body>

<div id="container">
    <video id="input_video" playsinline></video>
    <canvas id="output_canvas"></canvas>
    
    <div id="feedback">1. CARICA VIDEO</div>

    <div id="top-left" class="ui-panel">
        <h3 style="margin:0; color:#ff5722;">TARGETING SYSTEM</h3>
        <div style="font-size: 0.8rem; margin-bottom: 10px;">L'app ignorerà persone fuori zona</div>
        Tiri: <span id="shot-count" class="stat">0</span><br>
        Target Giocatore: <span id="target-status" class="stat">NON IMPOSTATO</span>
    </div>

    <div id="controls" class="ui-panel">
        <label class="btn-label" for="video_file">CARICA VIDEO</label>
        <input type="file" id="video_file" accept="video/*">
        <button id="btn-start" style="display:none;">AVVIA ANALISI</button>
        <button id="btn-save" style="display:none; background:#4CAF50;">SALVA REPORT</button>
        <button onclick="location.reload()" style="background:#444;">RESET</button>
    </div>
</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxcQq1oHvo8XvyO-WBYgdjuX5XFvOaDHXUKwtjvvnu2gOCfR4IrktzLHacZis4QZjV21g/exec";

const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const feedback = document.getElementById('feedback');

let canestroPos = null;
let playerTargetX = null; // Coordinata X del giocatore da seguire
let calibrationStep = 0; // 0: caricamento, 1: canestro, 2: giocatore
let shotLog = [];
let state = "IDLE";
let currentShot = null;

// Gestione Click per Calibrazione Doppia
canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;

    if (calibrationStep === 1) {
        canestroPos = { x, y };
        calibrationStep = 2;
        feedback.innerText = "2. ORA CLICCA SUL GIOCATORE (TIRATORE)";
    } else if (calibrationStep === 2) {
        playerTargetX = x;
        document.getElementById('target-status').innerText = "LOCK-ON ATTIVO";
        feedback.innerText = "CALIBRAZIONE OK. PREMI AVVIA ANALISI.";
        document.getElementById('btn-start').style.display = "block";
    }
});

function getAngle(a, b, c) {
    let rad = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
    let ang = Math.abs(rad * 180 / Math.PI);
    return ang > 180 ? 360 - ang : ang;
}

function analyzePose(lm) {
    const hip = lm[24]; // Anca destra per posizione corpo
    
    // --- FILTRO ROBUSTEZZA ---
    // Se la persona rilevata è lontana più del 15% rispetto alla X del giocatore cliccato, ignorala
    if (playerTargetX !== null) {
        const distance = Math.abs(hip.x - playerTargetX);
        if (distance > 0.15) { 
            // Questa persona non è il nostro tiratore (probabilmente l'arbitro)
            return; 
        }
    }

    const nose = lm[0], shoulder = lm[12], elbow = lm[14], wrist = lm[16], knee = lm[26], ankle = lm[28], index = lm[20], foot = lm[32];
    const kA = getAngle(lm[24], knee, ankle);
    const eA = getAngle(shoulder, elbow, wrist);

    // Logica di stato (Dip -> Rise -> Release)
    if (state === "IDLE" && kA < 140) {
        state = "DIP";
        currentShot = { 
            timestamp: new Date().toLocaleTimeString(),
            dip: { kA, bA: Math.abs(Math.atan2(shoulder.x - hip.x, shoulder.y - hip.y) * 180 / Math.PI) },
            maxK: kA 
        };
    }
    if (state === "DIP" && kA > currentShot.maxK + 5) state = "RISE";
    if (state === "RISE" && eA > 155) {
        state = "RELEASE";
        captureShot(lm, eA, ankle.x);
    }
}

function captureShot(lm, angle, startX) {
    const shotData = {
        timestamp: currentShot.timestamp,
        dip_knee: Math.round(currentShot.dip.kA),
        release_angle: Math.round(angle),
        sway: (startX - lm[28].x).toFixed(4)
    };
    shotLog.push(shotData);
    document.getElementById('shot-count').innerText = shotLog.length;
    document.getElementById('btn-save').style.display = "block";
    setTimeout(() => { state = "IDLE"; }, 1500);
}

const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });
pose.onResults(r => {
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    ctx.drawImage(r.image, 0,0,canvas.width,canvas.height);
    if (r.poseLandmarks) {
        // Disegna lo scheletro solo se è il target giusto (opzionale, per debug)
        const isTarget = playerTargetX && Math.abs(r.poseLandmarks[24].x - playerTargetX) < 0.15;
        drawConnectors(ctx, r.poseLandmarks, POSE_CONNECTIONS, {color: isTarget ? '#00FF00' : '#FF0000', lineWidth: 2});
        analyzePose(r.poseLandmarks);
    }
    // Disegna Linea Target
    if (playerTargetX) {
        ctx.beginPath();
        ctx.moveTo(playerTargetX * canvas.width, 0);
        ctx.lineTo(playerTargetX * canvas.width, canvas.height);
        ctx.strokeStyle = "rgba(0, 230, 118, 0.3)";
        ctx.setLineDash([5, 5]);
        ctx.stroke();
    }
});

document.getElementById('video_file').onchange = (e) => {
    video.src = URL.createObjectURL(e.target.files[0]);
    video.onloadeddata = () => {
        calibrationStep = 1;
        feedback.innerText = "1. CLICCA SUL FERRO DEL CANESTRO";
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.drawImage(video, 0,0,canvas.width,canvas.height);
    };
};

document.getElementById('btn-start').onclick = () => {
    feedback.innerText = "ANALISI IN CORSO...";
    video.play();
    (async function loop() {
        if (!video.ended) { await pose.send({image: video}); requestAnimationFrame(loop); }
        else { feedback.innerText = "COMPLETATO"; }
    })();
};

document.getElementById('btn-save').onclick = async function() {
    this.innerText = "INVIO...";
    await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(shotLog) });
    alert("Dati salvati!");
    this.innerText = "SALVATO";
};
</script>
</body>
</html>
