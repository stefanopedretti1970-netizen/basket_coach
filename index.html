<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Basket Lab - Sniper Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { position: absolute; width: 1px; height: 1px; opacity: 0; }
        canvas { width: 100vw; height: 100vh; object-fit: contain; cursor: crosshair; background: #111; }
        .ui-panel { position: absolute; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; border: 1px solid #444; pointer-events: auto; z-index: 100; }
        #top-left { top: 15px; left: 15px; width: 250px; }
        #controls { bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
        #feedback { position: absolute; top: 20%; width: 100%; text-align: center; font-size: 1.5rem; font-weight: bold; color: #ff5722; text-shadow: 2px 2px 4px #000; pointer-events: none; z-index: 10; }
        button, .btn-label { background: #ff5722; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        input[type="file"] { display: none; }
        .stat { color: #00e676; font-weight: bold; }
        /* Canvas di debug invisibile */
        #crop_canvas { display: none; }
    </style>
</head>
<body>

<div id="container">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    <canvas id="crop_canvas"></canvas> <!-- Canvas per il ritaglio -->
    
    <div id="feedback">CARICA VIDEO</div>

    <div id="top-left" class="ui-panel">
        <h3 style="margin:0; color:#ff5722;">SNIPER TRACKING</h3>
        Tiri: <span id="shot-count" class="stat">0</span><br>
        Target: <span id="target-status" class="stat">Seleziona giocatore...</span>
    </div>

    <div id="controls" class="ui-panel">
        <label class="btn-label" for="video_file">CARICA VIDEO</label>
        <input type="file" id="video_file" accept="video/*">
        <button id="btn-start" style="display:none;">AVVIA ANALISI SELEZIONE</button>
        <button id="btn-save" style="display:none; background:#4CAF50;">SALVA REPORT</button>
        <button onclick="location.reload()" style="background:#444;">RESET</button>
    </div>
</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxcQq1oHvo8XvyO-WBYgdjuX5XFvOaDHXUKwtjvvnu2gOCfR4IrktzLHacZis4QZjV21g/exec";

const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const cropCanvas = document.getElementById('crop_canvas');
const cropCtx = cropCanvas.getContext('2d');
const feedback = document.getElementById('feedback');

let canestroPos = null;
let playerX = null; 
let calibrationStep = 0; 
let shotLog = [];
let state = "IDLE";
let currentShot = null;

// Parametri per il ritaglio (ROI)
let roi = { x: 0, width: 1 }; 

function draw() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    if (canestroPos) {
        ctx.beginPath(); ctx.arc(canestroPos.x * canvas.width, canestroPos.y * canvas.height, 15, 0, 2*Math.PI);
        ctx.strokeStyle = "yellow"; ctx.lineWidth = 3; ctx.stroke();
    }
    if (playerX) {
        // Disegna la zona di ritaglio che l'IA vedrà
        ctx.fillStyle = "rgba(0, 230, 118, 0.2)";
        ctx.fillRect((playerX - 0.15) * canvas.width, 0, 0.3 * canvas.width, canvas.height);
        ctx.strokeStyle = "#00e676"; ctx.strokeRect((playerX - 0.15) * canvas.width, 0, 0.3 * canvas.width, canvas.height);
    }
}

document.getElementById('video_file').onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { video.src = ev.target.result; video.load(); };
    reader.readAsDataURL(file);
    video.onloadeddata = () => {
        video.currentTime = 0.1;
        setTimeout(() => {
            draw();
            calibrationStep = 1;
            feedback.innerText = "1. CLICCA SUL CANESTRO";
        }, 500);
    };
};

canvas.addEventListener('mousedown', (e) => {
    if (calibrationStep === 0) return;
    const rect = canvas.getBoundingClientRect();
    const x = ((e.clientX - rect.left) * (canvas.width / rect.width)) / canvas.width;
    const y = ((e.clientY - rect.top) * (canvas.height / rect.height)) / canvas.height;

    if (calibrationStep === 1) {
        canestroPos = { x, y };
        calibrationStep = 2;
        feedback.innerText = "2. CLICCA SUL GIOCATORE (TIRATORE)";
        draw();
    } else if (calibrationStep === 2) {
        playerX = x;
        // Definiamo l'area di ritaglio: 30% della larghezza totale centrata sul click
        roi.x = Math.max(0, playerX - 0.15);
        roi.width = 0.3; 
        document.getElementById('target-status').innerText = "TARGET ISOLATO";
        feedback.innerText = "GIOCATORE ISOLATO. AVVIA ANALISI.";
        document.getElementById('btn-start').style.display = "block";
        draw();
    }
});

const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });

pose.onResults(r => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    if (r.poseLandmarks) {
        // IMPORTANTE: Riconvertiamo le coordinate dal ritaglio al video intero
        r.poseLandmarks.forEach(lm => {
            lm.x = lm.x * roi.width + roi.x; // Trasla la X
            // lm.y rimane uguale perché non ritagliamo l'altezza
        });

        drawConnectors(ctx, r.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 3});
        
        // Analizziamo solo se siamo sicuri sia il target
        const hip = r.poseLandmarks[24];
        const kA = getAngle(hip, r.poseLandmarks[26], r.poseLandmarks[28]);
        const eA = getAngle(r.poseLandmarks[12], r.poseLandmarks[14], r.poseLandmarks[16]);

        if (state === "IDLE" && kA < 140) {
            state = "DIP"; currentShot = { maxK: kA };
        }
        if (state === "DIP" && kA > currentShot.maxK + 5) state = "RISE";
        if (state === "RISE" && eA > 155) {
            state = "RELEASE";
            shotLog.push({ t: new Date().toLocaleTimeString(), k: Math.round(currentShot.maxK), e: Math.round(eA) });
            document.getElementById('shot-count').innerText = shotLog.length;
            document.getElementById('btn-save').style.display = "block";
            setTimeout(() => state = "IDLE", 1200);
        }
    }
});

function getAngle(a, b, c) {
    let ang = Math.abs((Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x)) * 180 / Math.PI);
    return ang > 180 ? 360 - ang : ang;
}

document.getElementById('btn-start').onclick = function() {
    this.style.display = "none";
    feedback.innerText = "ANALISI SNIPER ATTIVA...";
    video.play();
    
    async function process() {
        if (!video.ended && !video.paused) {
            // RITAGLIO: Disegniamo solo la zona del giocatore nel canvas nascosto
            cropCanvas.width = video.videoWidth * roi.width;
            cropCanvas.height = video.videoHeight;
            cropCtx.drawImage(video, 
                roi.x * video.videoWidth, 0, roi.width * video.videoWidth, video.videoHeight, // Sorgente
                0, 0, cropCanvas.width, cropCanvas.height // Destinazione
            );

            // Mandiamo all'IA solo il ritaglio
            await pose.send({image: cropCanvas});
            requestAnimationFrame(process);
        } else {
            feedback.innerText = "ANALISI COMPLETATA";
        }
    }
    process();
};

document.getElementById('btn-save').onclick = async function() {
    this.innerText = "INVIO...";
    try {
        await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(shotLog) });
        alert("Dati inviati!");
        this.innerText = "SALVATO";
    } catch(e) { alert("Errore"); this.innerText = "RIPROVA"; }
};
</script>
</body>
</html>
