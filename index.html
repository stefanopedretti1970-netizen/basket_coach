<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Basket Lab - Fix Definitivo</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        canvas { width: 100vw; height: 100vh; object-fit: contain; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .panel { position: absolute; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 8px; pointer-events: auto; }
        #top-left { top: 10px; left: 10px; font-size: 12px; }
        #feedback { position: absolute; top: 35%; width: 100%; text-align: center; font-size: 1.8rem; font-weight: bold; color: #ff5722; text-shadow: 2px 2px 5px #000; }
        .controls { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; gap: 8px; pointer-events: auto; }
        button { padding: 12px 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; color: white; }
        #btn-start { background: #ff5722; }
        #btn-save-exit { background: #4CAF50; display: none; }
        #btn-discard-exit { background: #444; }
    </style>
</head>
<body>

<div id="container">
    <video id="input_video" playsinline muted autoplay></video>
    <canvas id="output_canvas"></canvas>
    
    <div id="ui">
        <div id="top-left" class="panel">
            GIOCATORE: <input type="text" id="player_name" value="Atleta 1" style="width:70px; background:#222; color:white; border:none;"><br>
            TIRI: <span id="counter">0</span> | ANG. GIN: <span id="debug_knee">-</span>
        </div>
        <div id="feedback">INQUADRATI DI PROFILO E AVVIA</div>
        <div class="controls">
            <button id="btn-start">AVVIA COACH</button>
            <button id="btn-save-exit">SALVA E CHIUDI</button>
            <button id="btn-discard-exit">ESCI</button>
        </div>
    </div>
</div>

<script>
// --- AUDIO ENGINE ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function playSound(freq, type, dur) {
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
}

const sounds = {
    perfect: () => { playSound(880, 'sine', 0.3); setTimeout(() => playSound(1046, 'sine', 0.3), 100); },
    error_dip: () => playSound(180, 'square', 0.4),
    error_path: () => playSound(400, 'sawtooth', 0.3),
    error_release: () => playSound(150, 'sine', 0.5),
    error_bio: () => { playSound(300, 'triangle', 0.2); setTimeout(() => playSound(300, 'triangle', 0.2), 150); }
};

// --- CORE LOGIC ---
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxUGkpdZCXjgT2g0lnLZV0OM8Esyp-Bm0xAXs4Pkvrr2KgaCZezWV3JORo5TgnchQmTcw/exec";
let shotLog = [];
let state = "IDLE"; 
let shotData = {};

const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const feedback = document.getElementById('feedback');
const debugKnee = document.getElementById('debug_knee');

function getAngle(a, b, c) {
    let rad = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
    let ang = Math.abs(rad * 180 / Math.PI);
    return ang > 180 ? 360 - ang : ang;
}

function analyzePose(lm) {
    const nose=lm[0], shoulder=lm[12], elbow=lm[14], wrist=lm[16], eye=lm[2], ear=lm[8], hip=lm[24], knee=lm[26], ankle=lm[28], foot=lm[32], index=lm[20];
    
    const kA = getAngle(hip, knee, ankle);
    const eA = getAngle(shoulder, elbow, wrist);
    const wA = getAngle(elbow, wrist, index);
    
    debugKnee.innerText = Math.round(kA) + "°";

    // 1. INIZIO TIRO (DIP)
    if (state === "IDLE" && kA < 140) {
        state = "DIP";
        shotData = { 
            errors: [], 
            minK: kA, 
            sX: ankle.x, 
            lowWristY: wrist.y, // Memorizza l'altezza minima della palla
            startTime: Date.now() 
        };
        feedback.innerText = "CARICAMENTO...";
    }

    if (state === "DIP") {
        if (nose.x > foot.x + 0.05) shotData.errors.push("Naso_oltre_le_punte_(Diving)");
        if (getAngle(knee, ankle, foot) < 70) shotData.errors.push("Talloni_piantati_(Heel_Striking)");
        
        // Se il polso risale rispetto al punto più basso, passiamo alla risalita
        if (wrist.y < shotData.lowWristY - 0.05) {
            state = "RISE";
        }
        if (wrist.y > shotData.lowWristY) shotData.lowWristY = wrist.y; // aggiorna punto più basso

        // Reset se bloccato troppo a lungo
        if (Date.now() - shotData.startTime > 3000) state = "IDLE";
    }

    // 2. RISALITA (RISE)
    if (state === "RISE") {
        feedback.innerText = "RISALITA...";
        
        if (wrist.y < nose.y && wrist.y > ear.y && Math.abs(wrist.y - (shotData.lastY || 0)) < 0.001) shotData.errors.push("L'Hitch_(Tiro_in_due_tempi)");
        shotData.lastY = wrist.y;

        // Se le gambe si distendono ma la palla è ancora bassa
        if (kA > 165 && wrist.y > nose.y) shotData.errors.push("Ball_after_Body_(Sincronismo_errato)");

        // Trigger Rilascio (Braccio si stende)
        if (eA > 155 && wrist.y < nose.y) {
            state = "RELEASE";
            if (wrist.x < ear.x) shotData.errors.push("Set_Point_Arretrato_(Catapulta)");
            if (elbow.y > eye.y) shotData.errors.push("Gomito_Basso_(Flat_Release)");
            if (nose.x > shoulder.x + 0.06) shotData.errors.push("Mento_proiettato_avanti_(Turtle_Neck)");
        }
    }

    // 3. RILASCIO
    if (state === "RELEASE") {
        if (wA < 150) shotData.errors.push("Angolo_del_Polso_piatto");

        setTimeout(() => {
            if (state === "RELEASE") {
                if (getAngle(shoulder, elbow, wrist) < 150) shotData.errors.push("Short-Arming_(Braccio_retratto)");
                if (Math.abs(ankle.x - shotData.sX) < 0.03) shotData.errors.push("Mancanza_di_Sway_(Atterraggio_rigido)");
                finalizeShot(eA, shotData.minK, Math.abs(ankle.x - shotData.sX));
            }
        }, 800);
        state = "WAIT_FOR_RESET";
    }
}

function finalizeShot(eA, kA, sway) {
    let res = shotData.errors.length > 0 ? shotData.errors[0] : "PERFETTO";
    let logMsg = res.replace(/_/g, " ");

    if (res === "PERFETTO") {
        sounds.perfect();
        feedback.innerHTML = "<span style='color:#00e676'>PERFETTO!</span>";
    } else {
        if (res.match(/Naso|Talloni/)) sounds.error_dip();
        else if (res.match(/Hitch|Ball|Cata/)) sounds.error_path();
        else if (res.match(/Gomito|Short|Sway/)) sounds.error_release();
        else sounds.error_bio();
        feedback.innerHTML = "<span style='color:#ff3d00'>" + logMsg + "</span>";
    }

    shotLog.push({
        player: document.getElementById('player_name').value,
        esito: logMsg,
        dettagli: shotData.errors.join(", ").replace(/_/g, " "),
        angoloGomito: Math.round(eA),
        angoloGinocchio: Math.round(kA),
        swayCm: Math.round(sway * 100)
    });

    document.getElementById('counter').innerText = shotLog.length;
    document.getElementById('btn-save-exit').style.display = "block";
    
    setTimeout(() => { 
        state = "IDLE"; 
        feedback.innerText = "PRONTO";
    }, 2000);
}

// --- MEDIAPIPE ---
const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
pose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

pose.onResults(r => {
    if (!r.image) return;
    canvas.width = r.image.width; canvas.height = r.image.height;
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(r.image, 0, 0, canvas.width, canvas.height);
    if (r.poseLandmarks) {
        drawConnectors(ctx, r.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
        analyzePose(r.poseLandmarks);
    }
    ctx.restore();
});

document.getElementById('btn-start').onclick = function() {
    if (!audioCtx) audioCtx = new AudioCtx();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    this.style.display = "none";
    const camera = new Camera(video, {
        onFrame: async () => { await pose.send({image: video}); },
        width: 640, height: 480, facingMode: 'environment'
    });
    camera.start().then(() => { feedback.innerText = "COACH ATTIVO"; });
};

document.getElementById('btn-save-exit').onclick = async function() {
    this.innerText = "...";
    try {
        await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(shotLog) });
        window.location.href = "about:blank";
    } catch (e) { alert("Errore invio"); this.innerText = "SALVA E CHIUDI"; }
};

document.getElementById('btn-discard-exit').onclick = () => { if(confirm("Esci?")) window.location.href = "about:blank"; };

</script>
</body>
</html>
