<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Coach - Pro Stable</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { position: absolute; width: 1px; height: 1px; opacity: 0; }
        canvas { width: 100vw; height: 100vh; object-fit: contain; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .panel { position: absolute; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 8px; pointer-events: auto; font-size: 11px; }
        #top-left { top: 10px; left: 10px; }
        #feedback { position: absolute; top: 35%; width: 100%; text-align: center; font-size: 2rem; font-weight: bold; color: #ff5722; text-shadow: 2px 2px 5px #000; }
        .controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 10px; pointer-events: auto; }
        button { padding: 15px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; color: white; background: #ff5722; }
        #btn-save { background: #4CAF50; display: none; }
    </style>
</head>
<body>
<div id="container">
    <video id="input_video" playsinline muted autoplay></video>
    <canvas id="output_canvas"></canvas>
    <div id="ui">
        <div id="top-left" class="panel">
            STATO: <span id="st" style="color:#00e676">IDLE</span><br>
            GINOCCHIO: <span id="kn">-</span> | GOMITO: <span id="el">-</span>
        </div>
        <div id="feedback">PREMI AVVIA</div>
        <div class="controls">
            <button id="btn-start">AVVIA COACH</button>
            <button id="btn-save">SALVA E CHIUDI</button>
            <button id="btn-exit" style="background:#444">ESCI</button>
        </div>
    </div>
</div>

<script>
// --- AUDIO ENGINE ---
let audioCtx = null;
function playNote(freq, type, dur, vol=0.1) {
    if (!audioCtx) return;
    try {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = type; o.frequency.value = freq;
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + dur);
    } catch(e) {}
}

const sounds = {
    perfect: () => { playNote(880, 'sine', 0.4); setTimeout(()=>playNote(1046,'sine',0.4),100); },
    err_low: () => playNote(150, 'square', 0.5, 0.2),
    err_mid: () => playNote(400, 'sawtooth', 0.4, 0.1),
    err_high: () => playNote(1200, 'sine', 0.3, 0.1)
};

// --- LOGICA ---
const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbxUGkpdZCXjgT2g0lnLZV0OM8Esyp-Bm0xAXs4Pkvrr2KgaCZezWV3JORo5TgnchQmTcw/exec";
let shotLog = [], state = "IDLE", shotData = {}, lastStateChange = Date.now();

const video = document.getElementById('input_video');
const canvas = document.getElementById('output_canvas');
const ctx = canvas.getContext('2d');
const feedback = document.getElementById('feedback');
const stDisp = document.getElementById('st');

function getAngle(a, b, c) {
    let rad = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
    let ang = Math.abs(rad * 180 / Math.PI);
    return ang > 180 ? 360 - ang : ang;
}

function updateState(newState) {
    state = newState;
    lastStateChange = Date.now();
    stDisp.innerText = newState;
}

function analyzePose(lm) {
    const nose=lm[0], shoulder=lm[12], elbow=lm[14], wrist=lm[16], hip=lm[24], knee=lm[26], ankle=lm[28], foot=lm[32], ear=lm[8];
    const kA = getAngle(hip, knee, ankle);
    const eA = getAngle(shoulder, elbow, wrist);
    
    document.getElementById('kn').innerText = Math.round(kA)+"°";
    document.getElementById('el').innerText = Math.round(eA)+"°";

    // Reset di sicurezza (se bloccato in uno stato per più di 3 secondi)
    if (state !== "IDLE" && (Date.now() - lastStateChange > 3000)) {
        updateState("IDLE");
        feedback.innerText = "RESET...";
        return;
    }

    // 1. INIZIO (DIP)
    if (state === "IDLE" && kA < 145) {
        updateState("DIP");
        shotData = { errors: [], minK: kA, startX: ankle.x, lowestWristY: wrist.y };
        feedback.innerText = "CARICAMENTO";
    }

    if (state === "DIP") {
        if (nose.x > foot.x + 0.05) shotData.errors.push("Busto_Avanti");
        if (getAngle(knee, ankle, foot) < 70) shotData.errors.push("Talloni_Piantati");
        if (wrist.y > shotData.lowestWristY) shotData.lowestWristY = wrist.y;

        // Passaggio a RISALITA (Se gambe si stendono o polso sale)
        if (kA > shotData.minK + 5 || wrist.y < shotData.lowestWristY - 0.02) {
            updateState("RISE");
            feedback.innerText = "RISALITA";
        }
    }

    if (state === "RISE") {
        // Riconoscimento errori in risalita
        if (Math.abs(wrist.y - (shotData.lastY || 0)) < 0.0005 && wrist.y < nose.y) shotData.errors.push("Hitch");
        shotData.lastY = wrist.y;

        // TRIGGER RILASCIO (Solo basato sull'angolo del gomito)
        if (eA > 155) {
            updateState("RELEASE");
            // Verifiche istantanee al rilascio
            if (elbow.y > nose.y) shotData.errors.push("Gomito_Basso");
            if (wrist.x < ear.x) shotData.errors.push("Catapulta");
            if (kA > 165 && wrist.y > nose.y) shotData.errors.push("Sincronismo_Errato");
            
            // Finalizzazione
            setTimeout(() => {
                if (Math.abs(ankle.x - shotData.startX) < 0.03) shotData.errors.push("No_Sway");
                finalizeShot(eA, shotData.minK);
            }, 700);
        }
    }
}

function finalizeShot(e, k) {
    let res = shotData.errors.length > 0 ? shotData.errors[0] : "PERFETTO";
    
    if (res === "PERFETTO") {
        sounds.perfect();
        feedback.innerHTML = "<span style='color:#00e676'>PERFETTO!</span>";
    } else {
        // Feedback sonoro differenziato
        if (res.match(/Busto|Talloni/)) sounds.err_low();
        else if (res.match(/Hitch|Sincronismo|Catapulta/)) sounds.err_mid();
        else sounds.err_high();
        feedback.innerHTML = "<span style='color:#ff3d00'>"+res.replace(/_/g," ")+"</span>";
    }

    shotLog.push({ player: document.getElementById('player_name').value, esito: res, dettagli: shotData.errors.join(","), angoloGomito: Math.round(e), angoloGinocchio: Math.round(k) });
    document.getElementById('counter').innerText = shotLog.length;
    document.getElementById('btn-save').style.display = "block";
    
    setTimeout(() => { updateState("IDLE"); feedback.innerText = "PRONTO"; }, 1500);
}

// --- MEDIAPIPE & CAMERA ---
const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
pose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
pose.onResults(r => {
    if (!r.image) return;
    canvas.width = r.image.width; canvas.height = r.image.height;
    ctx.save(); ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(r.image, 0,0,canvas.width,canvas.height);
    if (r.poseLandmarks) {
        drawConnectors(ctx, r.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
        analyzePose(r.poseLandmarks);
    }
    ctx.restore();
});

document.getElementById('btn-start').onclick = function() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    playNote(440, 'sine', 0.1); // Prova audio
    this.style.display = "none";
    const camera = new Camera(video, { onFrame: async () => { await pose.send({image: video}); }, width: 640, height: 480, facingMode: 'environment' });
    camera.start().then(() => { feedback.innerText = "COACH ATTIVO"; });
};

document.getElementById('btn-save').onclick = async function() {
    this.innerText = "...";
    try {
        await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(shotLog) });
        window.location.href = "about:blank";
    } catch (e) { alert("Errore"); }
};

document.getElementById('btn-exit').onclick = () => window.location.href = "about:blank";
</script>
</body>
</html>
